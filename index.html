<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask Any AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0a0a0a;
  --surface:  #121212;
  --border:   #242424;
  --text:     #F0EBE3;
  --sub:      #A8A29E;
  --dim:      #6B6560;
  --faint:    #2C2824;
  --hover-bg: #1C1917;
  --red:      #E8455A;
  --tt: background .25s, color .25s, border-color .25s;
}
[data-theme="light"] {
  --bg:       #F5F1EC;
  --surface:  #FFFFFF;
  --border:   #E0D9D1;
  --text:     #111111;
  --sub:      #4A4540;
  --dim:      #8A847E;
  --faint:    #D4CEC8;
  --hover-bg: #F9F6F2;
  --red:      #D43350;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  transition: var(--tt);
}

/* ── HEADER ── */
header {
  padding: 2.8rem 3rem 2.4rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 2rem;
  transition: var(--tt);
}
.eyebrow {
  font-family: 'Barlow', sans-serif;
  font-weight: 600;
  font-size: 11px;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: .9rem;
}
h1 {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: clamp(4rem, 8vw, 7.5rem);
  line-height: .9;
  letter-spacing: -.01em;
  text-transform: uppercase;
  color: var(--text);
}
h1 em { color: var(--red); font-style: normal; }
.tagline {
  font-family: 'Barlow', sans-serif;
  font-weight: 400;
  font-size: 15px;
  line-height: 1.7;
  color: var(--sub);
  margin-top: 1.4rem;
  max-width: 400px;
}

/* ── CONTROLS ── */
.controls {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 1.4rem;
  padding-top: .5rem;
  flex-shrink: 0;
}
.theme-row {
  display: flex;
  align-items: center;
  gap: .7rem;
  cursor: pointer;
  user-select: none;
}
.theme-label {
  font-family: 'Barlow', sans-serif;
  font-weight: 600;
  font-size: 11px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--dim);
  transition: color .2s;
}
.theme-row:hover .theme-label { color: var(--sub); }
.toggle-track {
  width: 40px; height: 22px;
  border-radius: 22px;
  background: var(--faint);
  border: 1px solid var(--border);
  position: relative;
  transition: background .3s, border-color .3s;
}
[data-theme="light"] .toggle-track { background: var(--red); border-color: var(--red); }
.toggle-thumb {
  position: absolute;
  top: 3px; left: 3px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--dim);
  transition: transform .25s, background .25s;
}
[data-theme="light"] .toggle-thumb { transform: translateX(18px); background: #fff; }
.shuffle-block {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: .5rem;
}
.shuffle-label {
  font-family: 'Barlow', sans-serif;
  font-weight: 600;
  font-size: 11px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--dim);
}
.ring-row { display: flex; align-items: center; gap: .8rem; }
.ring-svg {
  width: 42px; height: 42px;
  transform: rotate(-90deg);
  cursor: pointer;
  flex-shrink: 0;
}
.ring-bg  { fill: none; stroke: var(--border); stroke-width: 3; }
.ring-arc {
  fill: none; stroke: var(--red); stroke-width: 3; stroke-linecap: round;
  stroke-dasharray: 100.53; stroke-dashoffset: 0;
  transition: stroke-dashoffset .15s linear;
}
.ring-txt {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 700;
  fill: var(--sub);
  text-anchor: middle; dominant-baseline: central;
  transform: rotate(90deg) translateX(18px) translateY(-18px);
}
.btn-pause {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--dim);
  font-family: 'Barlow', sans-serif;
  font-weight: 600;
  font-size: 11px;
  letter-spacing: .16em;
  text-transform: uppercase;
  padding: .45rem .9rem;
  cursor: pointer;
  transition: color .2s, border-color .2s;
  white-space: nowrap;
}
.btn-pause:hover { color: var(--red); border-color: var(--red); }

/* ── QUERY ── */
.query-section { padding: 2.8rem 3rem 0; }
.query-section .eyebrow { margin-bottom: 1rem; }
.query-box {
  position: relative;
  width: 100%;
}
textarea#query {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 2px solid var(--border);
  color: var(--text);
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: clamp(1.4rem, 3vw, 2rem);
  line-height: 1.4;
  padding: .6rem 0 1rem;
  resize: none;
  outline: none;
  transition: border-color .2s, color .25s;
  display: block;
  letter-spacing: .01em;
}
textarea#query::placeholder { color: var(--dim); font-weight: 600; }
textarea#query:focus { border-bottom-color: var(--red); }

/* Clickable placeholder hint */
.placeholder-hint {
  margin-top: .6rem;
  font-family: 'Barlow', sans-serif;
  font-size: 12px;
  font-weight: 500;
  color: var(--dim);
  letter-spacing: .05em;
}
.placeholder-hint span {
  color: var(--red);
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 3px;
  transition: opacity .15s;
}
.placeholder-hint span:hover { opacity: .7; }

/* ── GRID ── */
.grid-section { padding: 2.8rem 3rem; flex: 1; }
.grid-section .eyebrow { margin-bottom: 1.2rem; }

/*
  ROW 1: 3 equal columns  (grid-template-columns: repeat(3,1fr))
  ROW 2: 5 equal columns  (repeat(5,1fr))
  ROW 3: 5 equal columns  (repeat(5,1fr))
  We render these as THREE separate sub-grids, not one big grid.
  This is the only way to guarantee no orphan gaps regardless of card order.
*/
.grid-rows { display: flex; flex-direction: column; gap: 1px; }

.grid-row {
  display: grid;
  gap: 1px;
  background: transparent; /* gap colour comes from border on cards */
}
.row-3 { grid-template-columns: repeat(3, 1fr); }
.row-5 { grid-template-columns: repeat(5, 1fr); }

/* On narrow screens, collapse sensibly */
@media (max-width: 900px) {
  .row-3 { grid-template-columns: repeat(3, 1fr); }
  .row-5 { grid-template-columns: repeat(5, 1fr); }
}
@media (max-width: 600px) {
  .row-3 { grid-template-columns: 1fr; }
  .row-5 { grid-template-columns: repeat(2, 1fr); }
}

/* Outer border wrapper */
.grid-border {
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 1px;
  background: var(--border); /* gap lines are this colour */
  transition: background .3s, border-color .3s;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card {
  background: var(--surface);
  padding: 1.8rem 1.6rem 1.5rem;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: background .15s, var(--tt);
  user-select: none;
  animation: cardIn .3s ease both;
  display: flex;
  flex-direction: column;
  min-height: 180px;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 0;
  background: var(--accent);
  transition: height .2s ease;
}
.card:hover { background: var(--hover-bg); }
.card:hover::before { height: 100%; }
.card.no-deeplink:hover::before { background: var(--faint); }

.card-action {
  position: absolute;
  top: 1.1rem; right: 1.1rem;
  font-family: 'Barlow', sans-serif;
  font-weight: 600;
  font-size: 11px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--accent);
  opacity: 0;
  transition: opacity .15s;
}
.card:hover .card-action { opacity: 1; }
.card.no-deeplink:hover .card-action { color: var(--dim); }

.card-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 2rem;
  letter-spacing: .01em;
  text-transform: uppercase;
  color: var(--text);
  line-height: 1;
  margin-bottom: .3rem;
  transition: color .15s;
}
.card:hover .card-name { color: var(--accent); }
.card.no-deeplink:hover .card-name { color: var(--sub); }

.card-maker {
  font-family: 'Barlow', sans-serif;
  font-weight: 500;
  font-size: 11px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: .8rem;
}

.card-tag {
  display: inline-block;
  align-self: flex-start;
  font-family: 'Barlow', sans-serif;
  font-weight: 600;
  font-size: 10px;
  letter-spacing: .14em;
  text-transform: uppercase;
  border: 1px solid var(--accent);
  color: var(--accent);
  padding: .2rem .55rem;
  margin-bottom: .9rem;
  opacity: .75;
  transition: opacity .15s;
}
.card.no-deeplink .card-tag { border-color: var(--dim); color: var(--dim); opacity: 1; }
.card:hover .card-tag { opacity: 1; }

.card-note {
  font-family: 'Barlow', sans-serif;
  font-weight: 400;
  font-size: 14px;
  line-height: 1.65;
  color: var(--sub);
  transition: color .15s;
  flex: 1;
}
.card:hover .card-note { color: var(--text); }

.card-hint {
  margin-top: .7rem;
  font-family: 'Barlow', sans-serif;
  font-weight: 400;
  font-size: 12px;
  font-style: italic;
  color: var(--dim);
  transition: color .15s;
}
.card:hover .card-hint { color: var(--sub); }

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 2rem; left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--red);
  color: var(--sub);
  font-family: 'Barlow', sans-serif;
  font-weight: 500;
  font-size: 14px;
  padding: .8rem 1.6rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s, transform .25s;
  white-space: nowrap;
  z-index: 999;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── FOOTER ── */
footer {
  border-top: 1px solid var(--border);
  padding: 1.2rem 3rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: var(--tt);
}
.f-count {
  font-family: 'Barlow', sans-serif;
  font-weight: 500;
  font-size: 11px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--dim);
}
.f-brand {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 1rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--red);
}

@media (max-width: 700px) {
  header { flex-direction: column; padding: 1.8rem 1.4rem 1.4rem; }
  .controls { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
  .query-section, .grid-section, footer { padding-left: 1.4rem; padding-right: 1.4rem; }
  h1 { font-size: 3.5rem; }
}
</style>
</head>
<body>

<header>
  <div>
    <p class="eyebrow">AI Intelligence Selector</p>
    <h1>ASK ONCE.<br><em>CHOOSE</em> WHO<br>ANSWERS.</h1>
    <p class="tagline">Type your question. Click an AI. Your query opens inside it — ready to go.</p>
  </div>
  <div class="controls">
    <div class="theme-row" onclick="toggleTheme()">
      <span class="theme-label" id="theme-label">Dark mode</span>
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
    </div>
    <div class="shuffle-block">
      <span class="shuffle-label">Auto-shuffle</span>
      <div class="ring-row">
        <svg class="ring-svg" viewBox="0 0 36 36" onclick="manualShuffle()" title="Shuffle now">
          <circle class="ring-bg"  cx="18" cy="18" r="16"/>
          <circle class="ring-arc" cx="18" cy="18" r="16" id="ring-arc"/>
          <text   class="ring-txt" x="18" y="18" id="ring-txt">30</text>
        </svg>
        <button class="btn-pause" id="pause-btn" onclick="togglePause()">Pause</button>
      </div>
    </div>
  </div>
</header>

<div class="query-section">
  <p class="eyebrow">Your Question</p>
  <div class="query-box">
    <textarea id="query" rows="2"
      placeholder="What is the one thing you wish you had learned 10 years earlier?"></textarea>
    <p class="placeholder-hint">
      Or try this: <span onclick="usePlaceholder()">What is the one thing you wish you had learned 10 years earlier?</span>
    </p>
  </div>
</div>

<div class="grid-section">
  <p class="eyebrow">Choose Your AI</p>
  <div class="grid-border" id="grid-border">
    <!-- Row 1: 3 cards -->
    <div class="grid-row row-3" id="row1"></div>
    <!-- Row 2: 5 cards -->
    <div class="grid-row row-5" id="row2"></div>
    <!-- Row 3: 5 cards -->
    <div class="grid-row row-5" id="row3"></div>
  </div>
</div>

<div id="toast"></div>

<footer>
  <span class="f-count" id="f-count"></span>
  <span class="f-brand">Intelligence Selector</span>
</footer>

<script>
const PLACEHOLDER = "What is the one thing you wish you had learned 10 years earlier?";

const LLMS = [
  {
    id:"claude", name:"Claude", maker:"Anthropic", tag:"Deep Reasoner",
    note:"Best for nuanced analysis, long-form writing, and tasks that require careful, layered judgment.",
    accent:"#E8455A",
    url: q=>`https://claude.ai/new?q=${encodeURIComponent(q)}`,
  },
  {
    id:"chatgpt", name:"ChatGPT", maker:"OpenAI", tag:"The All-Rounder",
    note:"Reliable and versatile. Fluent across code, prose, math, and almost everything in between.",
    accent:"#19C37D",
    url: q=>`https://chatgpt.com/?q=${encodeURIComponent(q)}`,
  },
  {
    id:"gemini", name:"Gemini", maker:"Google", tag:"The Researcher",
    note:"Built for deep search and synthesis. Excels at cross-referencing facts across vast knowledge.",
    accent:"#4285F4",
    url: q=>`https://gemini.google.com/app?q=${encodeURIComponent(q)}`,
  },
  {
    id:"perplexity", name:"Perplexity", maker:"Perplexity AI", tag:"The Fact-Checker",
    note:"Source-obsessed. If it exists on the internet, Perplexity will hunt it down and cite it.",
    accent:"#B39DFF",
    url: q=>`https://www.perplexity.ai/search?q=${encodeURIComponent(q)}`,
  },
  {
    id:"grok", name:"Grok", maker:"xAI", tag:"The Maverick",
    note:"Unfiltered and quick-witted. Real-time X data, edgy takes, and brutally direct answers.",
    accent:"#D0D0D0",
    url: q=>`https://x.com/i/grok?text=${encodeURIComponent(q)}`,
  },
  {
    id:"copilot", name:"Copilot", maker:"Microsoft", tag:"The Dev's Companion",
    note:"Embedded in your workflow. Gold standard for code, refactors, and Office productivity.",
    accent:"#2EA3F2",
    url: q=>`https://copilot.microsoft.com/?q=${encodeURIComponent(q)}`,
  },
  {
    id:"mistral", name:"Le Chat", maker:"Mistral AI", tag:"The Efficient One",
    note:"Blazingly fast, surprisingly capable, and genuinely privacy-conscious.",
    accent:"#FF8C42",
    url: q=>`https://chat.mistral.ai/chat?q=${encodeURIComponent(q)}`,
  },
  {
    id:"meta", name:"Meta AI", maker:"Meta", tag:"The Social AI",
    note:"Lives inside Facebook, Instagram, and WhatsApp. Finds you where you already are.",
    accent:"#1877F2",
    url: q=>`https://www.meta.ai/?q=${encodeURIComponent(q)}`,
  },
  {
    id:"deepseek", name:"DeepSeek", maker:"DeepSeek", tag:"The Dark Horse",
    note:"Shocked the world — frontier reasoning at a fraction of the cost. Don't underestimate it.",
    accent:"#6C9EFF",
    url: q=>`https://chat.deepseek.com/?q=${encodeURIComponent(q)}`,
  },
  {
    id:"venice", name:"Venice AI", maker:"Venice", tag:"The Private One",
    note:"No logs, no traces. Runs models that see nothing and remember nothing. Pure privacy.",
    accent:"#C084FC",
    url: q=>`https://venice.ai/chat?q=${encodeURIComponent(q)}`,
  },
  {
    id:"kimi", name:"Kimi", maker:"Moonshot AI", tag:"Long-Context King",
    note:"Handles massive documents without flinching. Feed it a whole codebase or legal brief.",
    accent:"#22D3EE",
    url:null, hint:"Query copied — paste on kimi.ai", link:"https://kimi.ai",
  },
  {
    id:"qwen", name:"Qwen", maker:"Alibaba", tag:"The Multilingual",
    note:"Fluent across 29 languages. The strongest pick for non-English content and translation.",
    accent:"#FF7043",
    url:null, hint:"Query copied — paste on qwenlm.ai", link:"https://chat.qwenlm.ai",
  },
  {
    id:"ernie", name:"Ernie", maker:"Baidu", tag:"The Eastern Lens",
    note:"Deeply trained on Chinese culture and language. Best for Mandarin and Asian markets.",
    accent:"#F04040",
    url:null, hint:"Query copied — paste on yiyan.baidu.com", link:"https://yiyan.baidu.com",
  },
];

/* ── SHUFFLE ── */
function shuffleArr(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let order = shuffleArr(LLMS);

/* ── BUILD A CARD ── */
function makeCard(llm, delay) {
  const card = document.createElement('div');
  card.className = 'card' + (llm.url ? '' : ' no-deeplink');
  card.style.setProperty('--accent', llm.accent);
  card.style.animationDelay = `${delay}ms`;
  card.innerHTML = `
    <span class="card-action">${llm.url ? 'Open →' : 'Copy + Open →'}</span>
    <div class="card-name">${llm.name}</div>
    <div class="card-maker">${llm.maker}</div>
    <span class="card-tag">${llm.tag}</span>
    <div class="card-note">${llm.note}</div>
    ${llm.hint ? `<div class="card-hint">* ${llm.hint}</div>` : ''}
  `;
  card.addEventListener('click', () => handleClick(llm));
  return card;
}

/* ── RENDER — strict 3 + 5 + 5 rows ── */
function render() {
  const row1 = document.getElementById('row1');
  const row2 = document.getElementById('row2');
  const row3 = document.getElementById('row3');
  row1.innerHTML = '';
  row2.innerHTML = '';
  row3.innerHTML = '';

  // Slice the 13 cards into exact rows
  const slice1 = order.slice(0, 3);   // 3
  const slice2 = order.slice(3, 8);   // 5
  const slice3 = order.slice(8, 13);  // 5

  slice1.forEach((llm, i) => row1.appendChild(makeCard(llm, i * 20)));
  slice2.forEach((llm, i) => row2.appendChild(makeCard(llm, (i + 3) * 20)));
  slice3.forEach((llm, i) => row3.appendChild(makeCard(llm, (i + 8) * 20)));

  document.getElementById('f-count').textContent = `${LLMS.length} models`;
}

function doShuffle() { order = shuffleArr(LLMS); render(); }

/* ── PLACEHOLDER CLICK ── */
function usePlaceholder() {
  const ta = document.getElementById('query');
  ta.value = PLACEHOLDER;
  ta.focus();
  // Put cursor at end
  ta.selectionStart = ta.selectionEnd = ta.value.length;
}

/* ── TIMER ── */
const TOTAL = 30;
const CIRC  = 2 * Math.PI * 16;
let elapsed = 0, paused = false;

function startTicker() {
  setInterval(() => {
    if (paused) return;
    elapsed++;
    updateRing();
    if (elapsed >= TOTAL) { elapsed = 0; doShuffle(); }
  }, 1000);
}
function resetTimer() { elapsed = 0; updateRing(); }
function updateRing() {
  document.getElementById('ring-arc').style.strokeDashoffset =
    CIRC * (1 - elapsed / TOTAL);
  document.getElementById('ring-txt').textContent =
    paused ? '—' : (TOTAL - elapsed);
}
function togglePause() {
  paused = !paused;
  document.getElementById('pause-btn').textContent = paused ? 'Resume' : 'Pause';
  updateRing();
}
function manualShuffle() { resetTimer(); doShuffle(); }

/* ── CLICK HANDLER ── */
function handleClick(llm) {
  const q = document.getElementById('query').value.trim();
  if (!q) {
    showToast('Type your question first');
    document.getElementById('query').focus();
    return;
  }
  if (llm.url) {
    window.open(llm.url(q), '_blank');
  } else {
    navigator.clipboard.writeText(q)
      .then(()  => showToast(`Copied — paste into ${llm.name}`))
      .catch(() => showToast(`Opening ${llm.name} — paste your query there`));
    setTimeout(() => window.open(llm.link, '_blank'), 300);
  }
}

/* ── THEME ── */
function toggleTheme() {
  const html  = document.documentElement;
  const light = html.getAttribute('data-theme') === 'light';
  html.setAttribute('data-theme', light ? 'dark' : 'light');
  document.getElementById('theme-label').textContent = light ? 'Dark mode' : 'Light mode';
}

/* ── TOAST ── */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

/* ── INIT ── */
render();
updateRing();
startTicker();
</script>
</body>
</html>
